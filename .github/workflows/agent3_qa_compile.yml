name: Run Agent 3 Compilation and QA Verification
on:
  workflow_dispatch: 

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Compilers and System Layout Shapers
        run: |
          sudo apt-get update
          sudo apt-get install -y libharfbuzz-bin libharfbuzz-dev
          pip install fontmake fontTools

      - name: Execute Unified Co-Working Orchestrator Engine
        run: python build_all.py

      # NEW CRITICAL CHECK: Fails instantly if fontmake output is missing or corrupt
      - name: Strict Font Integrity Verification Gate
        run: |
          python -c "
          import os
          import sys
          
          target_file = 'build/ArSL_Font.ttf'
          if not os.path.exists(target_file):
              print('❌ ERROR: fontmake completely failed to output a file!')
              sys.exit(1)
              
          file_size = os.path.getsize(target_file)
          print(f'Detected compiled font size: {file_size} Bytes')
          
          if file_size < 10000:
              print('❌ ERROR: Compiled file size is too small (< 10KB). Font binary is corrupt or empty!')
              sys.exit(1)
              
          print('✅ PASS: fontmake binary size matches production specifications.')
          "

       Tar-bundles the real, verified output files for download
      - name: Archive Compiled Production Binaries
        uses: actions/upload-artifact@v5
        with:
          name: ArSL-Compiled-Font-Binaries
          path: build/*