# Installs compiler and processing tools along with system shaping dependencies
      - name: Install Compilers and System Layout Shapers
        run: |
          sudo apt-get update
          sudo apt-get install -y harfbuzz-utils
          pip install fontmake fontTools

      - name: Inject Programmatic Component Layers via Agent 2 Tool
        run: python tools/create_component_layers.py

      - name: Compile Font Binaries
        run: |
          mkdir -p build
          fontmake -u source/ArSL_Base_Shell.ufo -o ttf --keep-overlaps --no-autohint --output-path build/ArSL_Font.ttf
          fontmake -u source/ArSL_Base_Shell.ufo -o otf --keep-overlaps --no-autohint --output-path build/ArSL_Font.otf

      - name: Run Agent 3 QA Structural Check
        run: |
          python -c "
          from fontTools.ttLib import TTFont
          import os
          font = TTFont('build/ArSL_Font.ttf')
          glyph_count = len(font.getGlyphOrder())
          print(f'Total Glyphs Detected: {glyph_count}')
          if glyph_count < 60: exit(1)
          "

      # NEW: Agent 3 launches live shaping validation loops
      - name: Execute Live Text Shaping Verification Layout Suite
        run: python tools/test_shaping.py

      - name: Archive Compiled Production Binaries
        uses: actions/upload-artifact@v5
        with:
          name: ArSL-Compiled-Font-Binaries
          path: build/*

      - name: Inject Programmatic Movement Markers via Agent 2 Tool
        run: python tools/inject_movement_markers.py
        
      - name: Inject Programmatic Component Layers via Agent 2 Tool
        run: python tools/create_component_layers.py

      - name: Inject Programmatic Expression Markers via Agent 2 Tool
        run: python tools/inject_expression_markers.py