name: Run Agent 3 Compilation and QA Verification
on:
  workflow_dispatch: 

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set up Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # FIXED: Utilizing your package dependencies to map hb-shape correctly on Ubuntu 24.04
      - name: Install Compilers and System Layout Shapers
        run: |
          sudo apt-get update
          sudo apt-get install -y libharfbuzz-bin libharfbuzz-dev
          pip install fontmake fontTools

      # Fires off the unified lifecycle loop across all 3 agent scripts
      - name: Execute Unified Co-Working Orchestrator Engine
        run: python build_all.py

      - name: Archive Compiled Production Binaries
        uses: actions/upload-artifact@v5
        with:
          name: ArSL-Compiled-Font-Binaries
          path: build/*